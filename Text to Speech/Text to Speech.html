<!DOCTYPE html>
<html lang="ar">
<head>
    <link rel="icon"
    href=https://thafd.bing.com/th/id/OIP.VVrGGqFxXx9T6UfgpP_7XgHaHa?rs=1&pid=ImgDetMain
    type="image/x-icon">
  <meta charset="UTF-8">
  <title>Input with Button</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      font-family: Arial, sans-serif;
    }

    .container {
      background-color: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .input-group {
      display: flex;
    }

    input[type="text"] {
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 8px 0 0 8px;
      outline: none;
      font-size: 16px;
      min-width: 250px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: #4A90E2;
      color: white;
      font-size: 16px;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #357ABD;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .controls label {
      font-size: 14px;
    }

    .controls input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="input-group">
      <input type="text" placeholder="Test To Speech" id="textInput">
      <button id="speakBtn">Speak</button>
    </div>

    <div class="controls">
      <label>
        speed:
        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
      </label>
      <label>
        Pitch:
        <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">
      </label>
      <label>
        Volume:
        <input type="range" id="volume" min="0" max="1" value="1" step="0.1">
      </label>
    </div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const button = document.getElementById('speakBtn');
    const rate = document.getElementById('rate');
    const pitch = document.getElementById('pitch');
    const volume = document.getElementById('volume');

    const testToSpeech = () => {
      let text = input.value;
      if (text.trim() === "") return;

      const voice = new SpeechSynthesisUtterance(text);
      voice.rate = parseFloat(rate.value);
      voice.pitch = parseFloat(pitch.value);
      voice.volume = parseFloat(volume.value);

      window.speechSynthesis.cancel(); // stop previous speech
      window.speechSynthesis.speak(voice);
    }

    button.addEventListener('click', testToSpeech);
  </script>
</body>
</html>
